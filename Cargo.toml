[package]
name = "pgpilot"
version = "0.6.0"
edition = "2021"

[dependencies]
anyhow = "1"
async-trait = "0.1"
base64 = "0.22"
chrono = { version = "0.4", features = ["serde"] }
dirs = "5"
futures = "0.3"
iced = { version = "0.14", features = ["tokio"] }
percent-encoding = "2"
rfd = "0.17"
rumqttc = { version = "0.24", features = ["use-rustls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
sequoia-openpgp = { version = "2", default-features = false, features = ["crypto-nettle"] }
tempfile = "3"
thiserror = "1"
tokio = { version = "1", features = ["full"] }
ureq = "3"
uuid = { version = "1", features = ["v4", "serde"] }

[dev-dependencies]
tempfile = "3"

[package]
name = "pgpilot"
version = "0.2.0"
edition = "2021"

[dependencies]
anyhow = "1"
chrono = "0.4"
iced = { version = "0.13", features = ["tokio"] }
rfd = "0.17"
sequoia-openpgp = { version = "2", default-features = false, features = ["crypto-nettle"] }
ureq = "2"
tokio = { version = "1", features = ["full"] }

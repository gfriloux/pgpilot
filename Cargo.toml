[package]
name = "pgpilot"
version = "0.4.0"
edition = "2021"

[dependencies]
anyhow = "1"
chrono = "0.4"
iced = { version = "0.14", features = ["tokio"] }
percent-encoding = "2"
rfd = "0.17"
sequoia-openpgp = { version = "2", default-features = false, features = ["crypto-nettle"] }
tempfile = "3"
ureq = "3"
tokio = { version = "1", features = ["full"] }
serde_yaml = "0.9"
serde = { version = "1", features = ["derive"] }
dirs = "5"

[dev-dependencies]
tempfile = "3"

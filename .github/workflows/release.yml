name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: cargo-release-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-release-${{ runner.os }}-

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install frontend dependencies
        run: cd app && npm ci

      # Build .deb and .rpm inside the Nix dev shell (provides LIBCLANG_PATH,
      # LD_LIBRARY_PATH, webkit2gtk, etc. required by sequoia-openpgp and Tauri).
      - name: Build Tauri app (deb + rpm)
        run: nix develop --command sh -c 'cd app && cargo-tauri build --bundles deb,rpm'

      # AppImage uses linuxdeploy (itself an AppImage). Any Nix-injected env var
      # (LD_LIBRARY_PATH, NIX_LDFLAGS, NIX_CC…) breaks linuxdeploy's library
      # analysis. We run this step entirely outside nix develop.
      # cargo recompiles from scratch here because PKG_CONFIG_PATH changed vs the
      # Nix step, so we install the system equivalents of every Nix buildInput.
      - name: Install system dependencies for AppImage
        run: |
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libsoup-3.0-dev \
            libdbus-1-dev \
            libssl-dev \
            librsvg2-dev \
            pkg-config \
            clang \
            libclang-dev \
            nettle-dev \
            libgmp-dev \
            libfuse2t64

      - name: Build AppImage
        run: |
          CLANG_VER=$(clang --version | grep -oP '(?<=clang version )\d+')
          export LIBCLANG_PATH=/usr/lib/llvm-${CLANG_VER}/lib
          cd app && APPIMAGE_EXTRACT_AND_RUN=1 ./node_modules/.bin/tauri build --bundles appimage

      - name: Generate release notes for this tag
        run: nix develop --command git-cliff --current --output RELEASE_NOTES.md

      - name: Update CHANGELOG.md
        run: |
          nix develop --command git-cliff --output CHANGELOG.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore(release): update CHANGELOG.md for ${{ github.ref_name }}"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: RELEASE_NOTES.md
          files: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage
          fail_on_unmatched_files: false

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is required for git-cliff to build the complete
          # changelog from all commits back to the previous tag.
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: cargo-release-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-release-${{ runner.os }}-
            cargo-${{ runner.os }}-

      - name: Build release binary
        run: nix develop --command cargo build --release

      - name: Generate changelog for this tag
        run: |
          nix develop --command git-cliff \
            --current \
            --output RELEASE_NOTES.md
        # git-cliff picks up cliff.toml automatically from the repo root.
        # --current generates notes only for the commits in the current tag
        # (i.e. since the previous tag), which is what a GitHub Release body
        # should contain.

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            target/release/pgpilot
          fail_on_unmatched_files: true

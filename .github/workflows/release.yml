name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: cargo-release-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-release-${{ runner.os }}-

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install frontend dependencies
        run: cd app && npm ci

      # Build .deb and .rpm inside the Nix dev shell (provides LIBCLANG_PATH,
      # LD_LIBRARY_PATH, webkit2gtk, etc. required by sequoia-openpgp and Tauri).
      - name: Build Tauri app (deb + rpm)
        run: nix develop --command sh -c 'cd app && cargo-tauri build --bundles deb,rpm'

      # AppImage uses linuxdeploy, which is itself an AppImage. Running it inside
      # the Nix dev shell fails because Nix's LD_LIBRARY_PATH overrides linuxdeploy's
      # bundled libs. We unset LD_LIBRARY_PATH and set APPIMAGE_EXTRACT_AND_RUN=1
      # (bypasses FUSE, not available on GitHub Actions runners) for this step only.
      # The Rust binary is already compiled — cargo skips recompilation.
      - name: Build AppImage
        run: |
          sudo apt-get install -y libfuse2
          nix develop --command sh -c 'cd app && env -u LD_LIBRARY_PATH APPIMAGE_EXTRACT_AND_RUN=1 cargo-tauri build --bundles appimage'

      - name: Generate release notes for this tag
        run: nix develop --command git-cliff --current --output RELEASE_NOTES.md

      - name: Update CHANGELOG.md
        run: |
          nix develop --command git-cliff --output CHANGELOG.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore(release): update CHANGELOG.md for ${{ github.ref_name }}"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: RELEASE_NOTES.md
          files: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage
          fail_on_unmatched_files: false

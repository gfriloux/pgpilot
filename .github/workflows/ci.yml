name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  check:
    name: Build, lint, audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      # All cargo commands run inside the dev shell so LIBCLANG_PATH and
      # LD_LIBRARY_PATH are set correctly for sequoia-openpgp and iced.

      - name: cargo fmt
        run: nix develop --command cargo fmt -- --check --config tab_spaces=2

      - name: cargo clippy
        run: nix develop --command cargo clippy -- -D warnings

      - name: cargo build
        run: nix develop --command cargo build

      - name: cargo test (unit)
        run: nix develop --command cargo test --lib --bins
        env:
          GNUPGHOME: /tmp/pgpilot-test-${{ github.run_id }}

      - name: Prepare GNUPGHOME for integration tests
        run: |
          GNUPGHOME=/tmp/pgpilot-test-slow-${{ github.run_id }}
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          # Allow loopback pinentry so gpg --batch can create keys without
          # a physical pinentry in headless CI. Does NOT remove passphrase
          # from production key creation — only affects this test GNUPGHOME.
          echo "allow-loopback-pinentry" > "$GNUPGHOME/gpg-agent.conf"
          echo "pinentry-mode loopback" > "$GNUPGHOME/gpg.conf"
          gpg-agent --homedir "$GNUPGHOME" --daemon || true
        env:
          GNUPGHOME: /tmp/pgpilot-test-slow-${{ github.run_id }}

      - name: cargo test (integration)
        run: nix develop --command cargo test -- --ignored
        timeout-minutes: 10
        env:
          GNUPGHOME: /tmp/pgpilot-test-slow-${{ github.run_id }}

      - name: cargo audit
        run: nix develop --command cargo audit
        # Treat advisories as warnings during audits so a newly published CVE
        # does not block merges before a fix is available. Remove --warn-severity
        # if you want hard failures.
        continue-on-error: true

  nix-check:
    name: nix flake check (Nix formatting & lints)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: nix flake check
        run: nix flake check

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  check:
    name: Build, lint, audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      # All cargo commands run inside the dev shell so LIBCLANG_PATH and
      # LD_LIBRARY_PATH are set correctly for sequoia-openpgp and webkit2gtk.

      - name: cargo fmt
        run: nix develop --command cargo fmt -- --check --config tab_spaces=2

      - name: cargo clippy
        run: nix develop --command cargo clippy -- -D warnings

      - name: cargo build
        run: nix develop --command cargo build

      - name: cargo test (unit)
        run: nix develop --command cargo test --package pgpilot --lib --bins
        env:
          GNUPGHOME: /tmp/pgpilot-test-${{ github.run_id }}

      - name: cargo test (integration)
        run: nix develop --command cargo test --package pgpilot -- --ignored
        timeout-minutes: 10
        env:
          GNUPGHOME: /tmp/pgpilot-test-slow-${{ github.run_id }}

      - name: cargo audit
        # RUSTSEC-2026-{0098,0099,0104,0049}: rustls-webpki 0.102.x pulled by
        # rumqttc 0.25.1 directly — cannot fix without upstream rumqttc release.
        # RUSTSEC-2025-0134: rustls-pemfile unmaintained (also via rumqttc).
        run: |
          nix develop --command cargo audit \
            --ignore RUSTSEC-2026-0098 \
            --ignore RUSTSEC-2026-0099 \
            --ignore RUSTSEC-2026-0104 \
            --ignore RUSTSEC-2026-0049 \
            --ignore RUSTSEC-2025-0134
        continue-on-error: true

  nix-check:
    name: nix flake check (Nix formatting & lints)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: nix flake check
        run: nix flake check

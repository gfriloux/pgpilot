<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Fond transparent (SVG autoportant) -->
  <defs>
    <style type="text/css">
      .key-shaft { fill: #ca9ee6; }
      .key-head { fill: #ca9ee6; }
      .key-ring { fill: none; stroke: #ca9ee6; stroke-width: 2.5; stroke-linecap: round; }
      .accent { fill: #c6d0f5; }
    </style>
  </defs>

  <!-- Clef stylisée (concept : clef GPG) -->
  <!-- Tige de la clef (diagonale) -->
  <rect x="24" y="52" width="56" height="8" rx="4" class="key-shaft" transform="rotate(-25 52 56)"/>

  <!-- Tête de la clef (cercle avec dent) -->
  <circle cx="76" cy="36" r="14" class="key-head"/>

  <!-- Dent distinctive de clef (petit rectangle) -->
  <rect x="82" y="48" width="6" height="8" class="key-shaft" rx="2"/>

  <!-- Anneau de la clef (symbole GPG) -->
  <circle cx="26" cy="72" r="12" class="key-ring"/>

  <!-- Point d'accent central (Mauve sur Text pour contraste) -->
  <circle cx="26" cy="72" r="5" class="accent"/>
</svg>
